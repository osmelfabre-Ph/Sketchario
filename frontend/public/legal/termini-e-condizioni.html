      function detectLanguage() {
        const params = new URLSearchParams(window.location.search);
        const forced = (params.get('lang') || '').toLowerCase();
        if (translations[forced]) return forced;

        const langs = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || 'it'];

        for (const lang of langs) {
          const short = String(lang || '').toLowerCase().slice(0, 2);
          if (translations[short]) return short;
        }

        return 'it';
      }

      function renderList(items) {
        if (!items || !items.length) return '';
        return `<ul>${items.map((item) => `<li>${item}</li>`).join('')}</ul>`;
      }

      function renderParagraphs(items) {
        if (!items || !items.length) return '';
        return items.map((item) => `<p>${item}</p>`).join('');
      }

      function renderSections(sections) {
        return sections.map((section) => `
          <h2>${section.title}</h2>
          ${renderParagraphs(section.paragraphs)}
          ${renderList(section.list)}
          ${section.note ? `<p class="small">${section.note}</p>` : ''}
        `).join('');
      }

      function renderPage(lang) {
        const copy = translations[lang] || translations.it;
        document.documentElement.lang = lang;
        document.title = copy.title;

        const metaDescription = document.querySelector('meta[name="description"]');
        if (metaDescription) metaDescription.setAttribute('content', copy.description);

        document.getElementById('terms-root').innerHTML = `
          <a class="top-link" href="/" data-back-link>${copy.back}</a>

          <div class="card">
            <h1>${copy.h1}</h1>
            <p class="sub">${copy.sub}</p>
            ${renderSections(copy.sections)}
            <div class="small">${copy.footer}</div>
          </div>
        `;

        const backLink = document.querySelector('[data-back-link]');
        if (backLink) {
          backLink.addEventListener('click', function (event) {
            const fallback = backLink.getAttribute('href') || '../index.html';
            event.preventDefault();
            if (window.history.length > 1) {
              window.history.back();
              return;
            }
            if (document.referrer) {
              window.location.href = document.referrer;
              return;
            }
            window.location.href = fallback;
          });
        }
      }
