  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --bg:#f5f1ea;
      --panel:#fffdf8;
      --panel-soft:#f1ebe0;
      --line:#d9cfbf;
      --text:#2d261d;
      --muted:#756b5c;
      --gold:#8f7346;
      --gold-soft:rgba(143,115,70,.10);
      --shadow:0 22px 50px rgba(72,52,23,.10);
      --radius:5px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(219,207,184,.45), transparent 32%),
        radial-gradient(circle at bottom right, rgba(203,188,158,.32), transparent 30%),
        linear-gradient(180deg,#faf7f1 0%, var(--bg) 100%);
      padding:24px 16px 40px;
    }

    .shell{
      width:min(1040px,100%);
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 16px;
      border:1px solid var(--line);
      background:rgba(255,253,248,.88);
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .brand-mark{
      width:42px;
      height:42px;
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid rgba(143,115,70,.22);
      background:#fff;
      flex:0 0 auto;
    }

    .brand-mark img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-copy strong{
      display:block;
      font-size:1rem;
      letter-spacing:.12em;
    }

    .brand-copy small{
      display:block;
      color:var(--muted);
      margin-top:3px;
      font-size:.78rem;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:42px;
      padding:0 14px;
      border:1px solid var(--text);
      border-radius:var(--radius);
      color:var(--text);
      background:#fffdf8;
      text-decoration:none;
      font-weight:600;
      white-space:nowrap;
    }

    .hero{
      position:relative;
      overflow:hidden;
      padding:34px 28px 28px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      background:
        linear-gradient(135deg, rgba(143,115,70,.10), rgba(255,253,248,.96) 42%),
        var(--panel);
    }

    .hero::after{
      content:"";
      position:absolute;
      right:-90px;
      top:-90px;
      width:260px;
      height:260px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(143,115,70,.14), transparent 62%);
      pointer-events:none;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:7px 11px;
      border:1px solid rgba(143,115,70,.22);
      background:rgba(255,255,255,.7);
      border-radius:999px;
      color:var(--gold);
      font-size:.78rem;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    h1{
      margin:16px 0 10px;
      font-family:"Playfair Display",serif;
      font-size:clamp(2.2rem,4.8vw,4rem);
      line-height:.98;
      letter-spacing:-.04em;
      max-width:12ch;
      color:#241d15;
    }

    .lead{
      max-width:760px;
      color:#544a3e;
      line-height:1.8;
      font-size:1rem;
    }

    .hero-meta{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-top:24px;
    }

    .meta-box{
      padding:14px 15px;
      border:1px solid var(--line);
      background:rgba(255,253,248,.84);
      border-radius:var(--radius);
    }

    .meta-label{
      display:block;
      font-size:.76rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:700;
    }

    .meta-value{
      font-size:.95rem;
      line-height:1.6;
      color:var(--text);
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns:minmax(0,250px) minmax(0,1fr);
      gap:18px;
      align-items:start;
    }

    .toc,
    .content{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--panel);
      box-shadow:var(--shadow);
    }

    .toc{
      position:sticky;
      top:16px;
      padding:18px;
    }

    .toc h2{
      margin:0 0 12px;
      font-size:.92rem;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .toc a{
      display:block;
      padding:9px 10px;
      border-radius:var(--radius);
      color:#4b4237;
      text-decoration:none;
      font-size:.94rem;
      line-height:1.35;
    }

    .toc a:hover{
      background:var(--gold-soft);
      color:var(--text);
    }

    .content{
      padding:8px;
    }

    .section{
      padding:24px 20px;
      border-bottom:1px solid var(--line);
    }

    .section:last-child{
      border-bottom:none;
    }

    .section h2{
      margin:0 0 10px;
      font-size:1.12rem;
      letter-spacing:.01em;
      color:#241d15;
    }

    .section p,
    .section li{
      margin:8px 0;
      color:#4b4237;
      line-height:1.85;
      font-size:.96rem;
    }

    .section ul{
      margin:10px 0 0;
      padding-left:18px;
    }

    .sub-block{
      margin-top:16px;
      padding:16px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:var(--panel-soft);
    }

    .sub-block strong{
      display:block;
      margin-bottom:6px;
      font-size:.9rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      color:var(--gold);
    }

    .contact-card{
      margin-top:8px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(143,115,70,.08), rgba(255,253,248,.95));
    }

    .contact-card p{
      margin:4px 0;
    }

    a.inline{
      color:var(--text);
      text-decoration:underline;
      text-decoration-color:rgba(143,115,70,.45);
      font-weight:600;
    }

    .footer-note{
      color:var(--muted);
      font-size:.82rem;
      line-height:1.7;
      text-align:center;
      padding:2px 8px 0;
    }

    @media (max-width: 860px){
      body{padding:14px 10px 24px}
      .topbar{
        flex-direction:column;
        align-items:stretch;
      }
      .back-btn{
        width:100%;
      }
      .hero{
        padding:26px 18px 20px;
      }
      .hero-meta,
      .grid{
        grid-template-columns:1fr;
      }
      .toc{
        position:static;
      }
      .content{
        padding:0;
      }
      .section{
        padding:20px 16px;
      }
    }

      function detectLanguage() {
        const params = new URLSearchParams(window.location.search);
        const forced = (params.get('lang') || '').toLowerCase();
        if (translations[forced]) return forced;

        const langs = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || 'it'];

        for (const lang of langs) {
          const short = String(lang || '').toLowerCase().slice(0, 2);
          if (translations[short]) return short;
        }

        return 'it';
      }

      function list(items) {
        return `<ul>${items.map((item) => `<li>${item}</li>`).join('')}</ul>`;
      }

      function paragraphs(items) {
        return items.map((item) => `<p>${item}</p>`).join('');
      }

      function subBlocks(groups) {
        return groups.map((group) => {
          const before = group.paragraphs ? paragraphs(group.paragraphs) : '';
          const mainList = group.items ? list(group.items) : '';
          const after = group.afterParagraphs ? paragraphs(group.afterParagraphs) : '';
          const afterList = group.afterItems ? list(group.afterItems) : '';
          return `<div class="sub-block"><strong>${group.title}</strong>${before}${mainList}${after}${afterList}</div>`;
        }).join('');
      }

        `;

        if (backLink) {
          backLink.addEventListener('click', function (event) {
            const fallback = backLink.getAttribute('href') || '../index.html';
            event.preventDefault();
            if (window.history.length > 1) {
              window.history.back();

            if (document.referrer) {
