version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sketchario-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - sketchario

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sketchario-backend
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      - RENDERER_URL=http://sketchario-renderer:3001
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongodb
      - renderer
    networks:
      - sketchario

  renderer:
    build:
      context: ./renderer
      dockerfile: Dockerfile
    container_name: sketchario-renderer
    restart: always
    environment:
      - UPLOADS_DIR=/app/uploads
      - NODE_OPTIONS=--max-old-space-size=2048
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - sketchario

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL:-https://app.sketchario.it}
    container_name: sketchario-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - sketchario

  nginx:
    image: nginx:alpine
    container_name: sketchario-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    networks:
      - sketchario

volumes:
  mongo_data:
  uploads:
  certbot_data:

networks:
  sketchario:
    driver: bridge
