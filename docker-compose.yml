version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: sketchario-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - sketchario

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sketchario-backend
    restart: always
    env_file:
      - ./backend/.env.production
    volumes:
      - uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - sketchario

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL:-http://77.81.226.230}
    container_name: sketchario-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - sketchario

  nginx:
    image: nginx:alpine
    container_name: sketchario-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl
      - certbot_data:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - sketchario

volumes:
  mongo_data:
  uploads:
  certbot_data:

networks:
  sketchario:
    driver: bridge
