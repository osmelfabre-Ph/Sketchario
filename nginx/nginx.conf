events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 500M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream backend {
        server sketchario-backend:8001;
    }

    upstream frontend {
        server sketchario-frontend:80;
    }

    # HTTP: redirect to HTTPS if domain configured, otherwise serve directly
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect to HTTPS only if we have a real domain (not IP)
        location / {
            set $do_redirect 0;
            if ($host ~* "^[a-zA-Z]") {
                set $do_redirect 1;
            }
            if ($do_redirect = 1) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            set $do_redirect 0;
            if ($host ~* "^[a-zA-Z]") {
                set $do_redirect 1;
            }
            if ($do_redirect = 1) {
                return 301 https://$host$request_uri;
            }
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }
    }

    # HTTPS server (activated when SSL certs exist)
    server {
        listen 443 ssl;
        server_name app.sketchario.it;

        ssl_certificate /etc/letsencrypt/live/app.sketchario.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.sketchario.it/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 30s;
            proxy_send_timeout 300s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
